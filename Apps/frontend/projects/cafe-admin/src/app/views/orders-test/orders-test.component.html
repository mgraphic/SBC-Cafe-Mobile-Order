<table>
  <thead>
    <tr>
      <th>Time</th>
      <th>Order ID</th>
      <th>Session ID</th>
    </tr>
  </thead>
  <tbody>
    @for (event of events(); track event) {
      <tr>
        <td>{{ event.timestamp }}</td>
        <td>{{ event.payload.orderId }}</td>
        <td>{{ event.payload.sessionId }}</td>
      </tr>
    }
  </tbody>
</table>
