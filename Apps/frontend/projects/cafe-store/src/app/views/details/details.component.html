<button class="btn btn-primary back" (click)="goBack()">Go Back</button>

@if (item) {
  <div class="item">
    <img [src]="item.images[0]" alt="coffee" />
    <h4>{{ item.name }}</h4>

    <div class="info">
      @if ((item.default_price.unit_amount || 0) > 0) {
        <span class="price pricing">{{
          item.default_price.unit_amount_decimal || 0
            | convertUnitPrice
            | currency
        }}</span>
      } @else {
        <span class="free pricing">Free</span>
      }

      <button
        class="btn btn-sm btn-outline-primary select"
        (click)="addToCart(item)"
      >
        Add to cart
      </button>
    </div>
  </div>
}
