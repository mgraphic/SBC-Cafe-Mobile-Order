services:
    # Database
    dynamodb-local:
        image: amazon/dynamodb-local
        working_dir: /home/dynamodblocal
        restart: always

        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'if [ "$(curl -s -o /dev/null -I -w ''%{http_code}'' http://localhost:8000)" == "400" ]; then exit 0; else exit 1; fi',
                ]
            interval: 5s
            timeout: 5s
            retries: 10

        expose:
            - 8000

        volumes:
            - './Docker/dynamodb:/home/dynamodblocal/data'

        ports:
            - '8000:8000'

    # Initialize
    db-init:
        depends_on:
            dynamodb-local:
                condition: service_healthy

        image: amazon/aws-cli
        working_dir: /

        volumes:
            - type: bind
              source: ./Local
              target: /upload

        environment:
            AWS_ACCESS_KEY_ID: dummyaccesskey
            AWS_SECRET_ACCESS_KEY: dummysecretkey
            AWS_DEFAULT_REGION: dummy-region
            AWS_ENDPOINT_URL: http://dynamodb-local:8000

        entrypoint: /bin/sh -c
        command: >-
            "aws dynamodb create-table --cli-input-json file://upload/create.users.json
            && aws dynamodb batch-write-item --request-items file://upload/import.users.json
            && aws dynamodb create-table --cli-input-json file://upload/create.user-tracker-logs.json
            && aws dynamodb create-table --cli-input-json file://upload/create.site-settings.json
            && aws dynamodb batch-write-item --request-items file://upload/import.site-settings.json"

    # Mock Server
    wiremock:
        image: wiremock/wiremock:latest-alpine
        container_name: wiremock
        restart: always
        ports:
            - '9000:8080'
        volumes:
            - ./Local/wiremock:/home/wiremock
        command:
            - '--extensions'
            - 'org.wiremock.webhooks.Webhooks'
            - '--global-response-templating'
        entrypoint:
            [
                '/docker-entrypoint.sh',
                '--global-response-templating',
                '--disable-gzip',
                '--verbose',
            ]

    # Mailer Webhook for Wiremock
    mailer:
        depends_on:
            - mailpit
            - wiremock
        image: marshallgraphics/sbc-cmo-wiremock-mailer-webhook:latest
        container_name: mailer-webhook
        restart: always
        ports:
            - '4000:4000'
        environment:
            SMTP_HOST: mailpit
            SMTP_PORT: 1025

    # Email Testing
    mailpit:
        image: axllent/mailpit:latest
        container_name: mailpit
        restart: always
        ports:
            - '1025:1025' # SMTP server
            - '8025:8025' # Web UI
        environment:
            MP_MAX_MESSAGES: 5000
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1

    # Stripe Mock API
    stripe-mock-api:
        image: marshallgraphics/sbc-cmo-stripe-mock-api:latest

        ports:
            - '4242:4242'

        volumes:
            - './Local/stripe-mock-api-data:/app/data'
