include:
    - docker-compose.dev.yml

services:
    # Demo Frontend
    cafe-store:
        build:
            context: ./Apps/frontend
            args:
                APP_NAME: cafe-store

        image: cafe-store
        container_name: cafe-store

        ports:
            - 8080:80

    cafe-admin:
        build:
            context: ./Apps/frontend
            args:
                APP_NAME: cafe-admin

        image: cafe-admin
        container_name: cafe-admin

        ports:
            - 8081:80

    # Demo Backend
    cafe-service:
        build:
            context: ./Apps/backend/cafe-service
            dockerfile: Dockerfile

        image: cafe-service
        container_name: cafe-service
        restart: on-failure

        ports:
            - '3000:3000'

        environment:
            AWS_ENDPOINT_URL: http://dynamodb-local:8000
            STRIPE_BASE_URL: http://stripe-mock-api:4242
            STRIPE_SECRET_KEY: sk_test_mock

    auth-service:
        build:
            context: ./Apps/backend/auth-service
            dockerfile: Dockerfile

        image: auth-service
        container_name: auth-service
        restart: on-failure

        ports:
            - '3100:3100'

        environment:
            AWS_ENDPOINT_URL: http://dynamodb-local:8000

    store:
        image: nginx:latest
        container_name: store-proxy

        ports:
            - '80:80'

        volumes:
            - ./Local/demo-store-proxy.nginx.conf:/etc/nginx/nginx.conf:ro

        depends_on:
            - cafe-store
            - db-init
            - cafe-service

    admin:
        image: nginx:latest
        container_name: admin-proxy

        ports:
            - '81:80'

        volumes:
            - ./Local/demo-admin-proxy.nginx.conf:/etc/nginx/nginx.conf:ro

        depends_on:
            - cafe-admin
            - db-init
            - cafe-service
            - auth-service

    # Stripe Mock API
    stripe-mock-api:
        image: marshallgraphics/sbc-cmo-stripe-mock-api:latest

        ports:
            - '4242:4242'

        volumes:
            - './Local/stripe-mock-api-data:/app/data'
